<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Delivery Service | AquaFresh
    </title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet"
          href="../css/main.css">

    <link rel="stylesheet"
          href="../css/delivery.css">

</head>

<body>

<div id="header"></div>

<section class="page-banner">

    <div class="container">

        <h1>
            Delivery Service
        </h1>

        <p>
            Schedule Your Water Delivery
        </p>

    </div>

</section>

<section class="delivery-section">

    <div class="container">

        <h2 class="section-main-title">
            Book Your Delivery
        </h2>

        <form class="delivery-form">

            <input type="text"
                   placeholder="Full Name"
                   required>

            <input type="email"
                   placeholder="Email Address"
                   required>

            <input type="tel"
                   placeholder="Phone Number"
                   required>

            <input type="date"
                   id="targetDeliveryDate"
                   required>

            <select id="targetDeliverySlot">

                <option>
                    Morning
                </option>

                <option>
                    Afternoon
                </option>

                <option>
                    Evening
                </option>

            </select>

            <textarea
            placeholder="Delivery Address"
            rows="5"></textarea>

            <button type="submit"
                    id="btnScheduleAction">

                Schedule Delivery

            </button>

        </form>

    </div>

</section>

<div id="footer"></div>

<script src="../js/dateValidation.js"></script>
<script src="../js/deliveryForm.js"></script>

<script>

fetch("header.html")
.then(response => response.text())
.then(data => {
document.getElementById("header").innerHTML = data;
});

fetch("footer.html")
.then(response => response.text())
.then(data => {
document.getElementById("footer").innerHTML = data;
});

</script>

</body>
</html>
